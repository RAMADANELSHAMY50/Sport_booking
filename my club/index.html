<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sports Lounge</title>

    <link rel="stylesheet" href="./index.css">

</head>

<body>

    <div class="container">

        <!-- Filter -->

        <div class="filter">

            <h2>Filter</h2>

            <hr>

            <h3>Location</h3>

            <select>

                <option>Cairo</option>
                <option>Alexandria</option>
                <option>Giza</option>

            </select>

            <h3>Sport</h3>

            <label>
                <input type="checkbox">
                Football
            </label>

            <br><br>

            <label>
                <input type="checkbox">
                Padel
            </label>

            <br><br>

            <label>
                <input type="checkbox">
                Tennis
            </label>

            <br><br>

            <label>
                <input type="checkbox">
                Basketball
            </label>

            <h3>Price</h3>

            <input type="range">

            <br><br>

            <button>Apply Filter</button>

        </div>

        <!-- Content -->

        <div class="content">

            <div class="title">

                <h1>Available Stadiums</h1>

                <p>Choose your favorite stadium</p>

            </div>

            <div class="cards">

                <!-- Card 1 -->

                <div class="card">

                    <img src="https://wallpapers.com/images/hd/aerial-view-gbk-madya-stadium-football-field-ykm7xc20zo05s2gq.jpg" alt="Football">

                    <div class="info">

                        <h2>Football Stadium</h2>

                        <p>⭐⭐⭐⭐⭐</p>

                        <h3>$20 / Hour</h3>

                        <button>Book Now</button>

                    </div>

                </div>

                <!-- Card 2 -->

                <div class="card">

                    <img src="https://wallpaperaccess.com/full/4762303.jpg" alt="Padel">

                    <div class="info">

                        <h2>Padel Court</h2>

                        <p>⭐⭐⭐⭐☆</p>

                        <h3>$25 / Hour</h3>

                        <button>Book Now</button>

                    </div>

                </div>

                <!-- Card 3 -->

                <div class="card">

                    <img src="https://wallpaperaccess.com/full/1947558.jpg" alt="Tennis">

                    <div class="info">

                        <h2>Tennis Court</h2>

                        <p>⭐⭐⭐⭐⭐</p>

                        <h3>$18 / Hour</h3>

                        <button>Book Now</button>

                    </div>

                </div>

                <!-- Card 4 -->

                <div class="card">

                    <img src="https://i.pinimg.com/originals/cb/da/b4/cbdab43a160f0596979b6e1ddccfc7c8.jpg" alt="Basketball">

                    <div class="info">

                        <h2>Basketball Court</h2>

                        <p>⭐⭐⭐⭐☆</p>

                        <h3>$22 / Hour</h3>

                        <button>Book Now</button>

                    </div>

                </div>

                <!-- Card 5 -->

                <div class="card">

                    <img src="https://images.pexels.com/photos/399187/pexels-photo-399187.jpeg?cs=srgb&dl=evening-field-football-field-399187.jpg&fm=jpg" alt="Football">

                    <div class="info">

                        <h2>Football Arena</h2>

                        <p>⭐⭐⭐⭐⭐</p>

                        <h3>$30 / Hour</h3>

                        <button>Book Now</button>

                    </div>

                </div>

                <!-- Card 6 -->

                <div class="card">

                    <img src="https://images.pexels.com/photos/399187/pexels-photo-399187.jpeg?cs=srgb&dl=evening-field-football-field-399187.jpg&fm=jpg" alt="Mini Stadium">

                    <div class="info">

                        <h2>Mini Stadium</h2>

                        <p>⭐⭐⭐⭐☆</p>

                        <h3>$15 / Hour</h3>

                        <button>

                            <a href="./booking.html">Book Now</a>

                        </button>

                    </div>

                </div>

            </div>

            <div class="pages">

                <button>Previous</button>

                <button>1</button>

                <button>2</button>

                <button>3</button>

                <button>Next</button>

            </div>

        </div>

    </div>

</body>

</html>
